<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杰冉影像工作室 - 請款系統 V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --a4-width: 210mm; --a4-height: 297mm; }
        body { background-color: #f0f2f5; }
        .a4-container {
            width: var(--a4-width); height: var(--a4-height);
            background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 15mm 20mm; box-sizing: border-box;
            position: relative; overflow: hidden; margin: auto;
        }
        body.vendor-mode .editor-sidebar { display: none; }
        body.vendor-mode .preview-area { width: 100%; padding: 20px 0; background-color: #525659; }
        .toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 4px; padding: 10px; position: fixed;
            z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="h-screen flex font-sans text-gray-800" id="bodyTag">

    <div class="w-1/2 h-full overflow-y-auto p-6 bg-white border-r editor-sidebar">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold border-l-4 border-blue-600 pl-3">杰冉請款管理系統</h1>
            <button onclick="generateShareLink()" class="bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold shadow hover:bg-blue-700">🔗 生成廠商連結</button>
        </div>
        
        <div class="space-y-4 mb-6 bg-gray-50 p-4 rounded border">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 mb-1">客戶抬頭 / 廠商名稱</label>
                <input type="text" id="clientName" class="w-full border rounded p-2 text-sm" placeholder="請輸入公司名稱" oninput="updatePreview()">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">請款日期</label>
                    <input type="date" id="invoiceDate" class="w-full border rounded p-2 text-sm" oninput="updatePreview()">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">請款單號</label>
                    <input type="text" id="invoiceNo" class="w-full border rounded p-2 text-sm" placeholder="20260507-01" oninput="updatePreview()">
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-2 px-1">
            <h2 class="font-bold text-sm">費用清單明細</h2>
            <button onclick="addRow()" class="text-blue-600 text-xs font-bold hover:underline">+ 新增項目</button>
        </div>
        
        <div class="flex gap-1 mb-2 px-1 text-[10px] font-bold text-gray-400 text-center">
            <div class="w-24">日期</div>
            <div class="w-20">類別</div>
            <div class="flex-grow">項目描述</div>
            <div class="w-10">數量</div>
            <div class="w-20">單價</div>
            <div class="w-6"></div>
        </div>
        <div id="itemsContainer" class="space-y-2 mb-6"></div>

        <div class="flex items-center mb-6 px-1">
            <input type="checkbox" id="taxToggle" class="h-4 w-4" onchange="updatePreview()">
            <label for="taxToggle" class="ml-2 text-sm font-bold text-blue-700">計算 5% 營業稅</label>
        </div>

        <div class="space-y-3 mb-8">
            <div class="p-3 border-2 border-dashed rounded bg-gray-50 text-center">
                <p class="text-[10px] font-bold text-gray-400 mb-2">附件證明上傳</p>
                <input type="file" id="fileInput" multiple accept="image/*,application/pdf" class="text-xs">
            </div>
            <div class="flex gap-2">
                <button onclick="exportToZip()" class="flex-grow bg-gray-800 text-white py-3 rounded font-bold hover:bg-black transition text-sm">打包下載並存檔</button>
                <button onclick="saveToHistory()" class="px-4 bg-blue-100 text-blue-700 rounded font-bold hover:bg-blue-200 transition text-sm">僅存檔</button>
            </div>
        </div>

        <div class="border-t pt-6">
            <h3 class="text-sm font-bold text-gray-500 mb-3 flex items-center">
                <span class="mr-2">📁</span> 先前請款紀錄
            </h3>
            <div id="historyList" class="space-y-2">
                </div>
        </div>
    </div>

    <div class="w-1/2 h-full flex justify-center overflow-y-auto p-6 preview-area">
        <div id="vendorActions" class="fixed top-4 right-4 flex gap-2" style="display:none;">
            <button onclick="window.print()" class="bg-white px-4 py-2 rounded shadow font-bold text-sm">列印</button>
            <button onclick="exportToZip()" class="bg-blue-600 text-white px-4 py-2 rounded shadow font-bold text-sm">下載檔案包</button>
        </div>

        <div id="invoicePreview" class="a4-container flex flex-col text-black">
            <div class="border-b-2 border-black pb-4 mb-6 flex justify-between items-end">
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter">杰冉影像工作室</h1>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest">Jayran Studio Production</p>
                </div>
                <div class="text-right text-[11px]">
                    <p>日期：<span id="prevDate"></span></p>
                    <p>單號：<span id="prevNo"></span></p>
                </div>
            </div>

            <div class="mb-6">
                <p class="text-[9px] font-bold text-gray-400 mb-1 uppercase">Customer / 客戶抬頭</p>
                <h2 class="text-lg font-bold border-b border-gray-100 pb-1" id="prevClient"></h2>
            </div>

            <table class="mb-6 text-[12px] w-full">
                <thead>
                    <tr class="border-b-2 border-black text-left">
                        <th class="py-2 w-8">#</th>
                        <th class="py-2 w-20">日期</th>
                        <th class="py-2 w-16">類別</th>
                        <th class="py-2">項目內容描述</th>
                        <th class="py-2 w-10 text-center">數量</th>
                        <th class="py-2 w-24 text-right">小計</th>
                    </tr>
                </thead>
                <tbody id="prevItems"></tbody>
            </table>

            <div class="flex-grow"></div>

            <div class="flex justify-end mb-10">
                <div class="w-48 text-[12px] space-y-1">
                    <div class="flex justify-between text-gray-500"><span>小計</span><span id="prevSubtotal"></span></div>
                    <div class="flex justify-between text-gray-500" id="taxRow" style="display:none;"><span>營業稅 (5%)</span><span id="prevTax"></span></div>
                    <div class="flex justify-between pt-2 border-t border-black font-bold text-[15px]"><span>總計金額</span><span id="prevTotal"></span></div>
                </div>
            </div>

            <div class="border-t-2 border-black pt-4">
                <p class="text-[10px] font-bold mb-2 tracking-widest">【 匯款資訊 】</p>
                <div class="grid grid-cols-2 gap-y-1 text-[11px]">
                    <p>銀行：中國信託 (822) </p>
                    <p>戶名：邱仁杰</p>
                    <div class="col-span-2">
                        帳號：<span id="bankAccount" onclick="copyAccount()" class="bg-yellow-100 px-1 font-bold cursor-pointer hover:bg-yellow-200" title="點擊複製">115540355582</span>
                        <span class="text-[9px] text-gray-400 ml-1">(點擊複製)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">帳號已複製！</div>

    <script>
        let items = [];

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            
            if (dataParam) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
                    loadDataToUI(decoded);
                    document.getElementById('bodyTag').classList.add('vendor-mode');
                    document.getElementById('vendorActions').style.display = 'flex';
                } catch (e) { console.error("解析失敗", e); }
            } else {
                document.getElementById('invoiceDate').valueAsDate = new Date();
                addRow();
            }
            renderInputs();
            updatePreview();
            renderHistory();
        };

        function addRow() {
            items.push({ id: Date.now(), date: '', cat: '', desc: '', qty: 1, price: 0 });
            renderInputs();
            updatePreview();
        }

        function removeRow(id) {
            items = items.filter(i => i.id !== id);
            renderInputs();
            updatePreview();
        }

        function handleUpdate(id, field, value) {
            const item = items.find(i => i.id === id);
            if (item) {
                item[field] = (field === 'qty' || field === 'price') ? Number(value) : value;
                updatePreview();
            }
        }

        function renderInputs() {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "flex gap-1 items-center bg-white p-1 rounded border shadow-sm mb-1";
                div.innerHTML = `
                    <input type="date" class="w-24 border rounded p-1 text-[10px]" value="${item.date}" oninput="handleUpdate(${item.id}, 'date', this.value)">
                    <input type="text" class="w-20 border rounded p-1 text-[10px]" placeholder="類別" value="${item.cat}" oninput="handleUpdate(${item.id}, 'cat', this.value)">
                    <input type="text" class="flex-grow border rounded p-1 text-[10px]" placeholder="項目描述" value="${item.desc}" oninput="handleUpdate(${item.id}, 'desc', this.value)">
                    <input type="number" class="w-10 border rounded p-1 text-[10px] text-center" value="${item.qty}" oninput="handleUpdate(${item.id}, 'qty', this.value)">
                    <input type="number" class="w-20 border rounded p-1 text-[10px] text-right" value="${item.price}" oninput="handleUpdate(${item.id}, 'price', this.value)">
                    <button onclick="removeRow(${item.id})" class="text-red-300 px-1 text-xs hover:text-red-600">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function updatePreview() {
            document.getElementById('prevClient').innerText = document.getElementById('clientName').value || "＿＿＿＿＿＿";
            document.getElementById('prevDate').innerText = document.getElementById('invoiceDate').value.replace(/-/g, '/');
            document.getElementById('prevNo').innerText = document.getElementById('invoiceNo').value || "尚未設定";

            const tbody = document.getElementById('prevItems');
            tbody.innerHTML = '';
            let subtotal = 0;

            items.forEach((item, idx) => {
                const total = item.qty * item.price;
                subtotal += total;
                tbody.innerHTML += `
                    <tr class="border-b border-gray-50">
                        <td class="py-2 text-gray-400 text-[10px]">${idx+1}</td>
                        <td class="py-2">${item.date.replace(/-/g, '/')}</td>
                        <td class="py-2 font-bold text-blue-600 text-[11px]">${item.cat}</td>
                        <td class="py-2">${item.desc}</td>
                        <td class="py-2 text-center">${item.qty}</td>
                        <td class="py-2 text-right font-bold">NT$ ${total.toLocaleString()}</td>
                    </tr>
                `;
            });

            const hasTax = document.getElementById('taxToggle').checked;
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            const grandTotal = subtotal + tax;

            document.getElementById('prevSubtotal').innerText = "NT$ " + subtotal.toLocaleString();
            document.getElementById('taxRow').style.display = hasTax ? 'flex' : 'none';
            document.getElementById('prevTax').innerText = "NT$ " + tax.toLocaleString();
            document.getElementById('prevTotal').innerText = "NT$ " + grandTotal.toLocaleString();
        }

        // 歷史紀錄功能
        function saveToHistory() {
            const client = document.getElementById('clientName').value;
            if (!client) { alert("請輸入廠商名稱再存檔！"); return; }
            
            const data = {
                id: Date.now(),
                c: client,
                d: document.getElementById('invoiceDate').value,
                n: document.getElementById('invoiceNo').value,
                t: document.getElementById('taxToggle').checked,
                i: items,
                total: document.getElementById('prevTotal').innerText
            };

            let history = JSON.parse(localStorage.getItem('jayran_history') || '[]');
            history.unshift(data);
            if (history.length > 20) history.pop(); // 最多存20筆
            localStorage.setItem('jayran_history', JSON.stringify(history));
            
            renderHistory();
            showToast("紀錄已儲存");
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('jayran_history') || '[]');
            container.innerHTML = history.length ? '' : '<p class="text-xs text-gray-400 text-center">尚無紀錄</p>';

            history.forEach(data => {
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded border shadow-sm flex justify-between items-center text-xs group";
                div.innerHTML = `
                    <div class="flex-grow cursor-pointer" onclick="loadRecord(${data.id})">
                        <p class="font-bold text-gray-700">${data.c}</p>
                        <p class="text-gray-400 text-[10px]">${data.d} | ${data.total}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadRecord(${data.id})" class="text-blue-500 hover:underline">編輯</button>
                        <button onclick="deleteRecord(${data.id})" class="text-red-300 hover:text-red-600 font-bold">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function loadRecord(id) {
            const history = JSON.parse(localStorage.getItem('jayran_history') || '[]');
            const data = history.find(d => d.id === id);
            if (data && confirm("載入此紀錄將覆蓋目前正在輸入的內容，確定嗎？")) {
                loadDataToUI(data);
                renderInputs();
                updatePreview();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deleteRecord(id) {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                let history = JSON.parse(localStorage.getItem('jayran_history') || '[]');
                history = history.filter(d => d.id !== id);
                localStorage.setItem('jayran_history', JSON.stringify(history));
                renderHistory();
            }
        }

        function loadDataToUI(data) {
            document.getElementById('clientName').value = data.c || "";
            document.getElementById('invoiceDate').value = data.d || "";
            document.getElementById('invoiceNo').value = data.n || "";
            document.getElementById('taxToggle').checked = data.t || false;
            items = data.i || [];
        }

        function copyAccount() {
            const acc = document.getElementById('bankAccount').innerText;
            navigator.clipboard.writeText(acc).then(() => showToast("帳號已複製"));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function generateShareLink() {
            const data = {
                c: document.getElementById('clientName').value,
                d: document.getElementById('invoiceDate').value,
                n: document.getElementById('invoiceNo').value,
                t: document.getElementById('taxToggle').checked,
                i: items
            };
            const str = unescape(encodeURIComponent(JSON.stringify(data)));
            const encoded = btoa(str);
            const url = window.location.origin + window.location.pathname + '?data=' + encoded;
            navigator.clipboard.writeText(url).then(() => alert("廠商連結已複製！"));
        }

        async function exportToZip() {
            const el = document.getElementById('invoicePreview');
            const canvas = await html2canvas(el, { scale: 2 });
            const img = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(img, 'PNG', 0, 0, 210, 297);
            
            const zip = new JSZip();
            const client = document.getElementById('clientName').value || "廠商";
            zip.file(`杰冉請款單_${client}.pdf`, pdf.output('blob'));
            zip.file(`杰冉請款單_${client}.png`, img.split(',')[1], {base64: true});

            const files = document.getElementById('fileInput').files;
            if (files.length > 0) {
                const folder = zip.folder("相關附件");
                for (let i = 0; i < files.length; i++) { folder.file(files[i].name, files[i]); }
            }

            zip.generateAsync({type:"blob"}).then(content => {
                saveAs(content, `杰冉請款資料包_${client}.zip`);
                saveToHistory(); // 下載完自動存檔
            });
        }
    </script>
</body>
</html>
